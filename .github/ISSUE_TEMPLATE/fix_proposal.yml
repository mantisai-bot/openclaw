name: Fix proposal
description: Propose a specific fix or improvement backed by source-level investigation.
title: ""
labels: []
body:
  - type: markdown
    attributes:
      value: |
        For contributors who have traced the code path and have a specific implementation in mind.
        If you haven't investigated the source yet, use Bug Report or Feature Request instead.
  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      description: What kind of change is this?
      options:
        - Bug fix
        - Feature
        - Improvement / refactor
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken or missing, and why existing behavior is insufficient.
      placeholder: Audio-only MP4/M4A files are skipped by the transcription pipeline because...
    validations:
      required: true
  - type: textarea
    id: root_cause
    attributes:
      label: Root cause / code path
      description: |
        The specific function, file, and code path involved.
        Include the chain of calls that leads to the current behavior.
      placeholder: |
        In `src/media/mime.ts`, `sniffMime()` delegates to `fileTypeFromBuffer()`.
        The library identifies all MPEG-4 containers as `video/mp4` regardless of audio tracks.

        ```
        Audio-only MP4 → fileTypeFromBuffer() → "video/mp4"
          → kindFromMime("video/mp4") → "video"
          → selectAttachments({ capability: "audio" }) → []
        ```
      render: markdown
    validations:
      required: true
  - type: textarea
    id: proposed_fix
    attributes:
      label: Proposed fix
      description: The specific change, with code if applicable. Reference exact files and functions.
      placeholder: |
        Generalize the ftyp sub-brand correction into `sniffMime()` in `src/media/mime.ts`:

        ```ts
        if (sniffed?.mime === 'video/mp4' && buffer.length >= 12) {
            const subBrand = buffer.slice(8, 12).toString('ascii');
            if (subBrand === 'M4A ' || subBrand === 'M4B ') return 'audio/mp4';
        }
        ```
      render: markdown
    validations:
      required: true
  - type: textarea
    id: prior_art
    attributes:
      label: Relationship to existing work
      description: |
        Related issues, PRs, or prior implementations. Explain how this proposal relates to them.
      placeholder: |
        - Generalizes the LINE-specific fix from #29751 / commit `1da7906`
        - Same root cause as #4008 (Slack voice messages)
        - Unrelated to #5209 (different pipeline layer)
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: |
        Who is affected, severity, frequency, and practical consequence.
      placeholder: |
        Affected: All channels sending audio-only MP4/M4A files
        Severity: Medium (silent failure — no error, transcription just doesn't happen)
        Frequency: Every M4A file sent
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenClaw version
      description: Version where the behavior was confirmed.
      placeholder: 2026.3.2
    validations:
      required: true
  - type: textarea
    id: additional_information
    attributes:
      label: Additional information
      description: Extra context, alternatives considered, or constraints.
